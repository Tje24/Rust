name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: nightly
  ANDROID_SDK_VERSION: 34
  NDK_VERSION: 26.1.10909125
  BUILD_TOOLS_VERSION: 34.0.0

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: android-build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV

      - name: Setup NDK toolchain
        run: |
          export PATH=$PATH:$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            libclang-dev \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (desktop)
        run: cargo clippy -- -D warnings || true

      - name: Build for Android ARM64 (Primary)
        run: |
          cargo build --lib --target aarch64-linux-android --release
        continue-on-error: false

      - name: Build for Android ARMv7 (Secondary)
        run: |
          cargo build --lib --target armv7-linux-androideabi --release
        continue-on-error: true

      - name: Build for Android x86_64 (Emulator)
        run: |
          cargo build --lib --target x86_64-linux-android --release
        continue-on-error: true

      - name: Build desktop binary (verification)
        run: cargo build --bin editor_desktop --release

      - name: Upload ARM64 library
        uses: actions/upload-artifact@v4
        with:
          name: librust_editor-arm64
          path: target/aarch64-linux-android/release/librust_editor.so
          if-no-files-found: ignore

      - name: Upload ARMv7 library
        uses: actions/upload-artifact@v4
        with:
          name: librust_editor-armv7
          path: target/armv7-linux-androideabi/release/librust_editor.so
          if-no-files-found: ignore

      - name: Upload x86_64 library
        uses: actions/upload-artifact@v4
        with:
          name: librust_editor-x86_64
          path: target/x86_64-linux-android/release/librust_editor.so
          if-no-files-found: ignore

      - name: Upload desktop binary
        uses: actions/upload-artifact@v4
        with:
          name: editor_desktop
          path: target/release/editor_desktop
          if-no-files-found: ignore
